<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CtrlKey.ai — Keyboard Shortcuts Encyclopedia</title>
<meta name="description" content="7,746 keyboard shortcuts for Excel, Word, PowerPoint, Illustrator and more. Filter by Windows or Mac, copy with one click.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{
  --bg:#111827;--surface:#1e2d40;--surface2:#243447;--surface3:#2a3d54;
  --border:#2d4060;--border2:#3a5070;
  --text:#F0F4F8;--text2:#CBD5E1;--muted:#7A92AA;--muted2:#566a7f;
  --teal:#2EC4B6;--teal-dim:rgba(46,196,182,0.12);--teal-glow:rgba(46,196,182,0.25);
  --amber:#F5A623;--amber-dim:rgba(245,166,35,0.12);
  --key-bg:#0d1c2b;--key-border:#2d4060;--key-shadow:#090f18;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--logo-text:#1B2333;
  --win-color:#4FC3F7;--win-dim:rgba(79,195,247,0.12);
  --mac-color:#A8D8A8;--mac-dim:rgba(168,216,168,0.12);
}
[data-theme="light"]{
  --bg:#F0F4F8;--surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#EEF2F7;
  --border:#D1DCE8;--border2:#B8CAD8;
  --text:#1B2333;--text2:#334155;--muted:#6B7E94;--muted2:#94A3B8;
  --teal:#1DA89E;--teal-dim:rgba(29,168,158,0.1);--teal-glow:rgba(29,168,158,0.2);
  --amber:#D4880A;--amber-dim:rgba(212,136,10,0.1);
  --key-bg:#E8EFF7;--key-border:#B8CAD8;--key-shadow:#C4D0DC;
  --shadow:0 4px 24px rgba(0,0,0,0.1);--logo-text:#ffffff;
  --win-color:#0078D7;--win-dim:rgba(0,120,215,0.1);
  --mac-color:#2E7D32;--mac-dim:rgba(46,125,50,0.1);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}

/* HEADER */
.header{position:sticky;top:0;z-index:200;background:rgba(17,24,39,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px}
[data-theme="light"] .header{background:rgba(240,244,248,0.94)}
.header-inner{max-width:1360px;margin:0 auto;display:flex;align-items:center;gap:12px;height:54px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo img{height:34px;width:auto;display:block}
.header-badge{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 9px;border-radius:5px;white-space:nowrap}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-shop{font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:500;background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,0.3);padding:5px 12px;border-radius:7px;text-decoration:none;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;flex-shrink:0}
.btn-shop:hover{background:var(--amber);color:var(--logo-text)}
.theme-toggle{width:40px;height:22px;background:var(--surface3);border:1px solid var(--border2);border-radius:20px;cursor:pointer;position:relative;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--teal);transition:transform .2s}
[data-theme="light"] .theme-toggle::after{transform:translateX(18px)}

/* HERO */
.hero{text-align:center;padding:56px 20px 44px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,var(--teal-dim),transparent 70%);pointer-events:none}
.hero-logo{display:inline-flex;margin-bottom:20px}
.hero-logo img{height:80px;width:auto;display:block}
.hero h1{font-size:clamp(1.7rem,4vw,2.8rem);font-weight:800;letter-spacing:-0.03em;line-height:1.1;margin-bottom:10px}
.hero h1 .hl{color:var(--teal)}
.hero-sub{font-size:0.92rem;color:var(--muted);margin-bottom:24px}

/* PLATFORM SELECTOR */
.plat-selector{display:flex;gap:12px;justify-content:center;margin-bottom:36px}
.plat-sel-btn{display:flex;align-items:center;gap:10px;padding:12px 28px;border-radius:14px;border:2px solid var(--border2);background:var(--surface);cursor:pointer;transition:all .2s;text-decoration:none;font-family:'Inter',sans-serif}
.plat-sel-btn:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.plat-sel-btn.win-btn.active{border-color:var(--win-color);background:var(--win-dim);box-shadow:0 0 0 3px rgba(79,195,247,0.15)}
.plat-sel-btn.mac-btn.active{border-color:var(--mac-color);background:var(--mac-dim);box-shadow:0 0 0 3px rgba(168,216,168,0.15)}
.plat-sel-icon{font-size:1.6rem;line-height:1;display:flex;align-items:center;justify-content:center;width:32px;height:32px}
.plat-sel-info{text-align:left}
.plat-sel-name{font-size:0.95rem;font-weight:700;color:var(--text);display:block}
.plat-sel-cnt{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted);display:block}
.win-btn.active .plat-sel-name{color:var(--win-color)}
.mac-btn.active .plat-sel-name{color:var(--mac-color)}

.stats-row{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:36px;box-shadow:var(--shadow)}
.stat{padding:12px 24px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:600;color:var(--amber);display:block;line-height:1;margin-bottom:3px}
.stat-label{font-size:0.68rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em}

/* SEARCH */
.search-wrap{max-width:640px;margin:0 auto;position:relative;z-index:1}
.search-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:14px;padding:12px 16px;box-shadow:var(--shadow);transition:border-color .2s}
.search-box:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}
.search-input-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.s-icon{color:var(--muted);font-size:1rem;flex-shrink:0}
#searchInput{flex:1;background:none;border:none;outline:none;font-family:'Inter',sans-serif;font-size:1rem;color:var(--text);caret-color:var(--teal)}
#searchInput::placeholder{color:var(--muted2)}
.search-hint{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--muted2);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0}
#clearBtn{cursor:pointer;color:var(--muted);background:var(--surface3);border:none;width:22px;height:22px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:0.75rem}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:0.7rem;color:var(--muted);white-space:nowrap;font-weight:500}
.prog-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.chip{font-family:'JetBrains Mono',monospace;font-size:0.63rem;padding:4px 9px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.chip:hover{border-color:var(--teal);color:var(--text)}
.chip.active{border-color:var(--teal);background:var(--teal-dim);color:var(--teal)}
.chip.all.active{background:var(--teal);color:var(--logo-text);border-color:var(--teal)}

/* RESULTS */
.results-section{max-width:1360px;margin:0 auto;padding:20px 20px 0}
.results-meta{font-size:0.8rem;color:var(--muted);margin-bottom:14px}
.results-meta strong{color:var(--text)}
.no-results{text-align:center;padding:48px 20px;color:var(--muted)}
.r-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.r-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.r-action{font-size:0.85rem;color:var(--text2);line-height:1.4;word-break:break-word}
.r-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.prog-tag{font-size:0.63rem;padding:3px 8px;border-radius:5px;font-weight:500}
.cat-tag{font-size:0.62rem;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:4px;border:1px solid var(--border)}
.copy-btn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--teal);color:var(--teal)}
.copy-btn.copied{color:var(--teal);border-color:var(--teal);background:var(--teal-dim)}
.load-more-wrap{text-align:center;padding:24px 0 40px;display:none}
.load-more-btn{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--teal);background:var(--teal-dim);border:1px solid var(--teal);padding:9px 24px;border-radius:8px;cursor:pointer}

/* KEY CAPS */
.keys-row{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-bottom:2px;max-width:100%;overflow:hidden}
.key{display:inline-flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:500;color:var(--text);background:var(--key-bg);border:1px solid var(--key-border);border-bottom:2px solid var(--key-shadow);border-radius:5px;padding:3px 7px;min-width:24px;max-width:100%;white-space:normal;word-break:break-word;line-height:1.4}
.key-plus{font-size:0.65rem;color:var(--muted2);margin:0 1px}

/* MAIN */
.main-area{max-width:1360px;margin:0 auto;padding:28px 20px 60px}
.section-title{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}

/* PROGRAM GRID */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:28px}
.prog-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 14px;cursor:pointer;transition:all .2s;text-decoration:none;display:block;position:relative}
.prog-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.prog-card.active{border-color:var(--teal);background:var(--teal-dim)}
.prog-card.plat-none{opacity:0.35;pointer-events:none}
.pc-icon{font-size:1.4rem;margin-bottom:8px;display:block}
.pc-name{font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:3px}
.pc-dot{width:6px;height:6px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
.pc-cnt{font-size:0.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* TABS */
.tabs-header{border-bottom:1px solid var(--border)}
.tabs-nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs-nav::-webkit-scrollbar{display:none}
.tab-btn{font-family:'JetBrains Mono',monospace;font-size:0.68rem;padding:9px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px;flex-shrink:0}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-cnt{font-size:0.6rem;background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;color:var(--muted)}
.sec-index-wrap{padding:10px 0 0;overflow-x:auto;scrollbar-width:none;white-space:nowrap;border-bottom:1px solid var(--border);margin-bottom:16px}
.sec-index-wrap::-webkit-scrollbar{display:none}
.sec-pill{display:inline-block;font-size:0.66rem;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;margin-right:5px;transition:all .15s;white-space:nowrap}
.sec-pill:hover{border-color:var(--border2);color:var(--text)}
.sec-pill.active{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.tab-content{display:none;padding-top:16px}
.tab-content.active{display:block}
.prog-search{margin-bottom:14px}
.prog-search input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-family:'Inter',sans-serif;font-size:0.88rem;color:var(--text);outline:none;transition:border-color .2s}
.prog-search input:focus{border-color:var(--teal)}
.prog-search input::placeholder{color:var(--muted2)}
.cat-group{margin-bottom:20px}
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.cat-hdr-name{display:flex;align-items:center;gap:7px;font-size:0.78rem;font-weight:600;color:var(--text2)}
.cat-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.cat-n{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:4px;border:1px solid var(--border)}
.most-badge{font-size:0.62rem;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(245,166,35,0.25);padding:2px 8px;border-radius:4px;margin-left:6px}
.sc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.sc-card:hover{border-color:var(--border2)}
.sc-action{font-size:0.8rem;color:var(--text2);line-height:1.4;word-break:break-word}
.sc-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;min-width:0;overflow:hidden}
.sc-keys{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;overflow:hidden}
.sc-copy{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--muted);background:none;border:1px solid transparent;padding:2px 6px;border-radius:3px;cursor:pointer;transition:all .15s;flex-shrink:0;align-self:flex-end}
.sc-copy:hover{border-color:var(--border2);color:var(--teal)}
.sc-copy.copied{color:var(--teal);border-color:var(--teal)}
.footer{border-top:1px solid var(--border);padding:20px;text-align:center;color:var(--muted2);font-size:0.75rem}
.footer a{color:var(--muted);text-decoration:none}
.footer a:hover{color:var(--teal)}
[data-theme="dark"] .mac-icon{color:#fff}
[data-theme="light"] .mac-icon{color:#333}
</style>
</head>

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function keyCaps(str){
  if(!str||!str.trim()) return '';
  // If the whole thing looks like a description (>40 chars, no +), show truncated
  const cleaned = str.trim();
  if(cleaned.length > 40 && !cleaned.includes('+') && !/^(Ctrl|Alt|Shift|Cmd|Command|Win|Mac|F\d)/i.test(cleaned)){
    return '<span class="key" style="max-width:200px;font-size:0.6rem;opacity:.7" title="'+esc(cleaned)+'">'+esc(cleaned.slice(0,35))+'…</span>';
  }
  const parts = cleaned.split(/(\+)(?=\S)/);
  return parts.map(p => p==='+' ? '<span class="key-plus">+</span>' : p.trim() ? '<span class="key">'+esc(p.trim())+'</span>' : '').join('');
}

function renderKeysFull(k){
  if(!k||k==='nan') return '';
  // Dual-platform: "Win: Ctrl+Z  |  Mac: Cmd+Z"
  if(k.includes(' | ')&&(k.includes('Win:')||k.includes('Mac:'))){
    return k.split(' | ').map(part=>{
      const p = part.trim();
      const label = p.startsWith('Win:') ? 'Win' : 'Mac';
      const keys = p.replace(/^(Win:|Mac:)\s*/i,'').trim();
      if(!keys) return '';
      return '<div class="keys-row"><span style="font-size:.6rem;font-family:monospace;color:var(--muted);margin-right:3px">'+label+'</span>'+keyCaps(keys)+'</div>';
    }).join('');
  }
  // Single-platform with prefix: "Mac: Command+Z" or "Win: Ctrl+Z"
  if(k.startsWith('Mac: ')||k.startsWith('Win: ')){
    const label = k.startsWith('Mac:') ? 'Mac' : 'Win';
    const keys = k.replace(/^(Win:|Mac:)\s*/,'').trim();
    if(!keys) return '';
    return '<div class="keys-row"><span style="font-size:.6rem;font-family:monospace;color:var(--muted);margin-right:3px">'+label+'</span>'+keyCaps(keys)+'</div>';
  }
  // Plain key (no prefix)
  if(!k.trim()) return '';
  return '<div class="keys-row">'+keyCaps(k)+'</div>';
}

function renderKeysForPlat(k, plat){
  if(!k||k==='nan') return '';
  // Dual-platform
  if(k.includes(' | ')&&(k.includes('Win:')||k.includes('Mac:'))){
    const parts = k.split(' | ').map(p=>p.trim());
    if(plat==='Windows'){
      const w = parts.find(p=>p.startsWith('Win:'));
      const keys = w ? w.replace(/^Win:\s*/i,'').trim() : '';
      return keys ? '<div class="keys-row">'+keyCaps(keys)+'</div>' : '';
    } else if(plat==='Mac'){
      const m = parts.find(p=>p.startsWith('Mac:'));
      const keys = m ? m.replace(/^Mac:\s*/i,'').trim() : '';
      return keys ? '<div class="keys-row">'+keyCaps(keys)+'</div>' : '';
    }
    return renderKeysFull(k);
  }
  // Single-platform prefixed
  if(k.startsWith('Mac: ')||k.startsWith('Mac:')){
    if(plat==='Mac'){
      const keys = k.replace(/^Mac:\s*/,'').trim();
      return keys ? '<div class="keys-row">'+keyCaps(keys)+'</div>' : '';
    }
    return ''; // Mac key shown on Windows filter = hide
  }
  if(k.startsWith('Win: ')||k.startsWith('Win:')){
    if(plat==='Windows'){
      const keys = k.replace(/^Win:\s*/,'').trim();
      return keys ? '<div class="keys-row">'+keyCaps(keys)+'</div>' : '';
    }
    return '';
  }
  // Plain key = Windows (no Mac equivalent in this row)
  if(plat==='Mac') return '';
  const keys = k.trim();
  return keys ? '<div class="keys-row">'+keyCaps(keys)+'</div>' : '';
}

function getKeyForCopy(k, plat){
  if(k.includes(' | ')){
    const parts = k.split(' | ');
    if(plat==='Mac'){ const m=parts.find(p=>p.startsWith('Mac:')); return (m||parts[0]).replace(/^(Win:|Mac:)\s*/,''); }
    const w=parts.find(p=>p.startsWith('Win:'));
    return (w||parts[0]).replace(/^(Win:|Mac:)\s*/,'');
  }
  return k.replace(/^(Win:|Mac:)\s*/,'');
}

function copyKey(btn, text){
  const clean = getKeyForCopy(text, activePlat);
  navigator.clipboard&&navigator.clipboard.writeText(clean).then(()=>{
    btn.textContent='✓ copied'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='copy'; btn.classList.remove('copied'); },1500);
  });
}

// Determine which keys belong to which platform
function keyHasPlat(k, plat){
  const kt = k.trim();
  if(kt.includes(' | ')){ // dual platform
    if(plat==='Windows') return /Win:/i.test(kt);
    if(plat==='Mac') return /Mac:/i.test(kt);
    return true;
  }
  if(plat==='Mac') return /^Mac:/i.test(kt);
  if(plat==='Windows') return !/^Mac:/i.test(kt);
  return true;
}

  'Microsoft Word':['Bold','Italic','Underline','Copy','Cut','Paste','Undo','Redo','Find','Find and replace','Save','Print','Select All','Open','Center text','Left align','Right align'],
  'Microsoft PowerPoint':['New slide','Duplicate slide','Copy','Cut','Paste','Undo','Redo','Bold','Italic','Underline','Start slideshow','End slideshow','Group','Ungroup','Save'],
  'Microsoft Outlook':['New email','Reply','Reply all','Forward','Send','Save','Delete','Mark as read','Mark as unread','Search','Bold','Italic','Underline','Undo'],
  'Microsoft Access':['Open database','Save','Print','Undo','Copy','Cut','Paste','Find','Delete','Refresh','Bold','Italic','Close window','New record'],
  'Microsoft Edge':['Open new tab','Close tab','Reopen closed tab','New window','Open file','Find on page','Reload','Zoom in','Zoom out','Full screen','Open history'],
  'Google Sheets':['Copy','Cut','Paste','Undo','Redo','Find','Bold','Italic','Underline','Select All','Insert row above','Insert column','Delete row','Fill down','Fill right'],
  'Google Docs':['Copy','Cut','Paste','Undo','Redo','Find','Find and replace','Bold','Italic','Underline','Select All','Print','Insert link','Comment','Heading 1'],
  'Visual Studio':['Build solution','Start debugging','Stop debugging','Step over','Step into','Set breakpoint','Find','Find and replace','Comment selection','Format document','Go to definition','Rename','Save','Undo','Redo'],
  'Adobe Illustrator':['Undo','Redo','Cut','Copy','Paste','Paste in front','Paste at back','Select All','Deselect All','Group','Ungroup','Save','Zoom in','Zoom out'],
  'Adobe Acrobat':['Open file','Save','Print','Find','Undo','Copy','Cut','Paste','Zoom in','Zoom out','Fit page','Next page','Previous page','First page','Last page'],
};

// ── PLATFORM STATE ──
let activePlat = 'All';
let activeFilter = 'all';
let query = '';
let visCount = 30;
let filtered = [];

function getDataForPlat(plat){
  if(plat==='All') return ALL_DATA;
  return ALL_DATA.filter(d => keyHasPlat(d.k, plat));
}

function cntForPlat(progName, plat){
  return ALL_DATA.filter(d => d.p===progName && (plat==='All' || keyHasPlat(d.k, plat))).length;
}

// Compute platform counts
const WIN_TOTAL = ALL_DATA.filter(d=>keyHasPlat(d.k,'Windows')).length;
const MAC_TOTAL = ALL_DATA.filter(d=>keyHasPlat(d.k,'Mac')).length;

// ── INIT PLATFORM BUTTONS ──
document.getElementById('winCnt').textContent = WIN_TOTAL.toLocaleString() + ' shortcuts';
document.getElementById('macCnt').textContent = MAC_TOTAL.toLocaleString() + ' shortcuts';

function setPlatform(plat, btn){
  // Toggle: click active = go back to All
  if(activePlat===plat){ activePlat='All'; document.querySelectorAll('.plat-sel-btn').forEach(b=>b.classList.remove('active')); }
  else { activePlat=plat; document.querySelectorAll('.plat-sel-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  updateForPlat();
}

function updateForPlat(){
  const plat = activePlat;
  const cnt = plat==='All' ? ALL_DATA.length : getDataForPlat(plat).length;

  // Count programs that have at least 1 shortcut for this platform
  const activeProg = plat==='All' ? PROGRAMS.length : PROGRAMS.filter(p => cntForPlat(p.name, plat) > 0).length;

  // Update stat
  document.getElementById('statShortcuts').textContent = cnt.toLocaleString();
  document.getElementById('statPrograms').textContent = activeProg;
  document.getElementById('statPlat').textContent = plat==='All' ? '2' : '1';
  document.getElementById('headerBadge').textContent = cnt.toLocaleString() + ' shortcuts';

  // Update program cards
  PROGRAMS.forEach(prog=>{
    const card = document.querySelector('.prog-card[data-tab="'+prog.id+'"]');
    if(!card) return;
    const c = cntForPlat(prog.name, plat);
    card.querySelector('.pc-cnt').textContent = c.toLocaleString() + ' shortcuts';
    card.classList.toggle('plat-none', c===0);
  });

  // Update active tab content
  const activeBtn = document.querySelector('.tab-btn.active');
  if(activeBtn) refreshTabContent(activeBtn.dataset.tab);

  // Update tab counts
  PROGRAMS.forEach(prog=>{
    const btn = document.querySelector('.tab-btn[data-tab="'+prog.id+'"]');
    if(!btn) return;
    const c = cntForPlat(prog.name, plat);
    const cnt2 = btn.querySelector('.tab-cnt');
    if(cnt2) cnt2.textContent = c.toLocaleString();
  });

  if(query) runSearch();
}

function refreshTabContent(tabId){
  const plat = activePlat;
  const prog = PROGRAMS.find(p=>p.id===tabId);
  if(!prog) return;
  const tg = document.getElementById('tg-'+tabId);
  if(!tg) return;
  tg.querySelectorAll('.sc-card').forEach(card=>{
    const k = card.dataset.k || '';
    const show = plat==='All' || keyHasPlat(k, plat);
    card.style.display = show ? '' : 'none';
    if(show){
      const keysDiv = card.querySelector('.sc-keys');
      if(keysDiv) keysDiv.innerHTML = plat==='All' ? renderKeysFull(k) : renderKeysForPlat(k, plat);
    }
  });
  tg.querySelectorAll('.cat-group').forEach(g=>{
    const any = [...g.querySelectorAll('.sc-card')].some(c=>c.style.display!=='none');
    g.style.display = any ? '' : 'none';
  });
}

// ── THEME ──
let theme = localStorage.getItem('ck-theme') || 'dark';
applyTheme(theme);
function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); document.getElementById('themeIcon').textContent=t==='dark'?'🌙':'☀️'; theme=t; localStorage.setItem('ck-theme',t); }
function toggleTheme(){ applyTheme(theme==='dark'?'light':'dark'); }

// ── Ctrl+K ──
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){ e.preventDefault(); document.getElementById('searchInput').focus(); }
  if(e.key==='Escape'&&query) clearSearch();
});

// ── CHIPS ──
const chipsEl = document.getElementById('progChips');
function mkChip(label,id,cls){
  const c=document.createElement('span');
  c.className='chip '+cls+(id==='all'?' active':'');
  c.dataset.f=id==='all'?'all':label;
  c.textContent=id==='all'?'All':label.replace('Microsoft ','MS ').replace('Google ','G ').replace('Adobe ','');
  c.onclick=()=>setFilter(c.dataset.f);
  return c;
}
chipsEl.appendChild(mkChip('All','all','all'));
PROGRAMS.forEach(p=>chipsEl.appendChild(mkChip(p.name,p.id,'')));

function setFilter(f){ activeFilter=f; document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.f===f)); if(query) runSearch(); }

// ── SEARCH ──
const si=document.getElementById('searchInput');
const cb=document.getElementById('clearBtn');
si.addEventListener('input',e=>{ query=e.target.value.trim(); cb.style.display=query?'flex':'none'; visCount=30; query.length>=1?runSearch():hideResults(); });
function clearSearch(){ si.value=''; query=''; cb.style.display='none'; hideResults(); si.focus(); }

function runSearch(){
  const q=query.toLowerCase();
  filtered=ALL_DATA.filter(d=>{
    if(activeFilter!=='all'&&d.p!==activeFilter) return false;
    if(activePlat!=='All'&&!keyHasPlat(d.k,activePlat)) return false;
    return d.k.toLowerCase().includes(q)||d.a.toLowerCase().includes(q)||d.c.toLowerCase().includes(q);
  });
  renderResults();
}

function renderResults(){
  const rs=document.getElementById('resultsSection');
  const grid=document.getElementById('resultsGrid');
  const meta=document.getElementById('resultsMeta');
  const lm=document.getElementById('loadMoreWrap');
  rs.style.display='block';
  document.getElementById('tabsSection').style.display='none';
  if(!filtered.length){ grid.innerHTML='<div class="no-results">No shortcuts found for "'+esc(query)+'"</div>'; meta.innerHTML=''; lm.style.display='none'; return; }
  const show=filtered.slice(0,visCount);
  meta.innerHTML='<strong>'+filtered.length+'</strong> shortcuts found'+(activeFilter!=='all'?' in '+activeFilter:'')+(activePlat!=='All'?' · '+activePlat:'');
  grid.innerHTML=show.map(d=>{
    const col=PROGRAMS.find(p=>p.name===d.p)?.color||'#2EC4B6';
    const icon=PROGRAMS.find(p=>p.name===d.p)?.icon||'⌨️';
    const keysHtml=activePlat==='All'?renderKeysFull(d.k):renderKeysForPlat(d.k,activePlat);
    const kForCopy=JSON.stringify(d.k).replace(/"/g,'&quot;');
    return '<div class="r-card"><div class="r-action">'+esc(d.a)+'</div><div>'+keysHtml+'</div><div class="r-meta"><span class="prog-tag" style="background:'+col+'18;color:'+col+';border:1px solid '+col+'33">'+icon+' '+esc(d.p.replace('Microsoft ','MS ').replace('Google ','G ').replace('Adobe ',''))+'</span><span class="cat-tag">'+esc(d.c)+'</span><button class="copy-btn" onclick="copyKey(this,'+kForCopy+')">copy</button></div></div>';
  }).join('');
  lm.style.display=filtered.length>visCount?'block':'none';
}
function showMore(){ visCount+=30; renderResults(); }
function hideResults(){ document.getElementById('resultsSection').style.display='none'; document.getElementById('tabsSection').style.display='block'; }

// ── BUILD TABS ──
const byProg={};
PROGRAMS.forEach(p=>byProg[p.name]={});
ALL_DATA.forEach(d=>{ if(!byProg[d.p]) byProg[d.p]={}; if(!byProg[d.p][d.c]) byProg[d.p][d.c]=[]; byProg[d.p][d.c].push(d); });

const progGrid=document.getElementById('progGrid');
const nav=document.getElementById('tabsNav');
const contents=document.getElementById('tabContents');

// All shortcuts tab
const allBtn=document.createElement('button');
allBtn.className='tab-btn';
allBtn.dataset.tab='all-shortcuts';
allBtn.innerHTML='<span style="width:7px;height:7px;border-radius:2px;background:var(--teal);display:inline-block"></span> All <span class="tab-cnt">'+ALL_DATA.length.toLocaleString()+'</span>';
allBtn.onclick=()=>switchTab('all-shortcuts');
nav.appendChild(allBtn);

const allTc=document.createElement('div');
allTc.className='tab-content';
allTc.id='tab-all-shortcuts';
let allHtml='<div class="prog-search"><input type="text" placeholder="Search all shortcuts…" oninput="filterTab(this,\'all-shortcuts\')" autocomplete="off"></div><div id="tg-all-shortcuts">';
PROGRAMS.forEach(prog=>{
  const cats=Object.entries(byProg[prog.name]||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!cats.length) return;
  const total=cats.reduce((s,[,items])=>s+items.length,0);
  allHtml+='<div class="cat-group" data-cat="'+esc(prog.name)+'"><div class="cat-hdr" style="border-bottom:2px solid '+prog.color+'40"><span class="cat-hdr-name"><span class="cat-dot" style="background:'+prog.color+'"></span><strong>'+esc(prog.icon)+' '+esc(prog.name)+'</strong></span><span class="cat-n">'+total+'</span></div><div class="sc-grid">';
  cats.forEach(([,items])=>items.forEach(d=>{
    const kJson=JSON.stringify(d.k).replace(/"/g,'&quot;');
    allHtml+='<div class="sc-card" data-k="'+esc(d.k)+'"><span class="sc-action">'+esc(d.a)+'</span><div class="sc-bottom"><div class="sc-keys">'+renderKeysFull(d.k)+'</div><button class="sc-copy" onclick="copyKey(this,'+kJson+')">copy</button></div></div>';
  }));
  allHtml+='</div></div>';
});
allHtml+='</div>';
allTc.innerHTML=allHtml;
contents.appendChild(allTc);

// Per-program tabs
PROGRAMS.forEach((prog,idx)=>{
  const cnt=cntForPlat(prog.name,'All');
  // Grid card
  const gc=document.createElement('a');
  gc.className='prog-card'+(idx===0?' active':'');
  gc.href='#'; gc.dataset.tab=prog.id;
  gc.innerHTML='<span class="pc-icon">'+prog.icon+'</span><div class="pc-name"><span class="pc-dot" style="background:'+prog.color+'"></span>'+prog.name.replace('Microsoft ','').replace('Google ','').replace('Adobe ','')+'</div><div class="pc-cnt">'+cnt.toLocaleString()+' shortcuts</div>';
  gc.onclick=e=>{ e.preventDefault(); switchTab(prog.id); };
  progGrid.appendChild(gc);

  // Tab button
  const btn=document.createElement('button');
  btn.className='tab-btn'+(idx===0?' active':'');
  btn.dataset.tab=prog.id;
  btn.innerHTML='<span style="width:7px;height:7px;border-radius:2px;background:'+prog.color+';display:inline-block"></span> '+prog.short+' <span class="tab-cnt">'+cnt.toLocaleString()+'</span>';
  btn.onclick=()=>switchTab(prog.id);
  nav.appendChild(btn);

  // Tab content
  const tc=document.createElement('div');
  tc.className='tab-content'+(idx===0?' active':'');
  tc.id='tab-'+prog.id;
  const cats=Object.entries(byProg[prog.name]).sort((a,b)=>a[0].localeCompare(b[0]));
  const allItems=Object.values(byProg[prog.name]).flat();
  const muList=MOST_USED[prog.name]||[];
  let html='<div class="prog-search"><input type="text" placeholder="Search within '+prog.name+'…" oninput="filterTab(this,\''+prog.id+'\')" autocomplete="off"></div><div id="tg-'+prog.id+'">';

  // Most Used section
  const muItems=allItems.filter(d=>muList.some(m=>d.a.toLowerCase().includes(m.toLowerCase())));
  if(muItems.length>0){
    html+='<div class="cat-group" data-cat="⭐ Most Used"><div class="cat-hdr"><span class="cat-hdr-name"><span class="cat-dot" style="background:'+prog.color+'"></span>Most Used<span class="most-badge">⭐ popular</span></span><span class="cat-n">'+muItems.length+'</span></div><div class="sc-grid">';
    muItems.slice(0,30).forEach(d=>{
      const kJson=JSON.stringify(d.k).replace(/"/g,'&quot;');
      html+='<div class="sc-card" data-k="'+esc(d.k)+'"><span class="sc-action">'+esc(d.a)+'</span><div class="sc-bottom"><div class="sc-keys">'+renderKeysFull(d.k)+'</div><button class="sc-copy" onclick="copyKey(this,'+kJson+')">copy</button></div></div>';
    });
    html+='</div></div>';
  }

  // All categories
  cats.forEach(([cat,items])=>{
    html+='<div class="cat-group" data-cat="'+esc(cat)+'"><div class="cat-hdr"><span class="cat-hdr-name"><span class="cat-dot" style="background:'+prog.color+'"></span>'+esc(cat)+'</span><span class="cat-n">'+items.length+'</span></div><div class="sc-grid">';
    items.forEach(d=>{
      const kJson=JSON.stringify(d.k).replace(/"/g,'&quot;');
      html+='<div class="sc-card" data-k="'+esc(d.k)+'"><span class="sc-action">'+esc(d.a)+'</span><div class="sc-bottom"><div class="sc-keys">'+renderKeysFull(d.k)+'</div><button class="sc-copy" onclick="copyKey(this,'+kJson+')">copy</button></div></div>';
    });
    html+='</div></div>';
  });
  html+='</div>';
  tc.innerHTML=html;
  contents.appendChild(tc);
});

function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+id));
  document.querySelectorAll('.prog-card').forEach(c=>c.classList.toggle('active',c.dataset.tab===id));
  document.querySelector('.prog-card[data-tab="'+id+'"]')?.scrollIntoView({behavior:'smooth',block:'nearest'});
  buildSecIndex(id);
  if(activePlat!=='All') refreshTabContent(id);
}

function buildSecIndex(tabId){
  const wrap=document.getElementById('secIdxWrap');
  const bar=document.getElementById('secIdx');
  const tabEl=document.getElementById('tab-'+tabId);
  if(!tabEl){wrap.style.display='none';return;}
  const groups=tabEl.querySelectorAll('.cat-group');
  if(groups.length<2){wrap.style.display='none';return;}
  wrap.style.display='block'; bar.innerHTML='';
  groups.forEach((g,i)=>{
    const pill=document.createElement('span');
    pill.className='sec-pill'+(i===0?' active':'');
    pill.textContent=g.dataset.cat||'';
    pill.onclick=()=>{ bar.querySelectorAll('.sec-pill').forEach(p=>p.classList.remove('active')); pill.classList.add('active'); g.scrollIntoView({behavior:'smooth',block:'start'}); };
    bar.appendChild(pill);
  });
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{ if(e.isIntersecting){ const cat=e.target.dataset.cat; bar.querySelectorAll('.sec-pill').forEach(p=>p.classList.toggle('active',p.textContent===cat)); }}),{rootMargin:'-60px 0px -80% 0px'});
  groups.forEach(g=>obs.observe(g));
}

function filterTab(input,id){
  const q=(input.value||'').toLowerCase();
  document.querySelectorAll('#tg-'+id+' .cat-group').forEach(g=>{
    let any=false;
    g.querySelectorAll('.sc-card').forEach(c=>{
      const k=c.dataset.k||'';
      const platOk=activePlat==='All'||keyHasPlat(k,activePlat);
      const show=platOk&&(!q||c.textContent.toLowerCase().includes(q));
      c.style.display=show?'':'none';
      if(show)any=true;
    });
    g.style.display=any?'':'none';
  });
}

setTimeout(()=>{ const f=document.querySelector('.tab-btn.active'); if(f) buildSecIndex(f.dataset.tab); },100);
</script>
